function importBackup(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!confirm(`Import backup? This will OVERWRITE all current data (${data.tasks?.length||0} tasks, ${data.sessions?.length||0} sessions).`))return;
        // clear and re-import
        const batchSize=400;
        const deleteAllAndReimport=async()=>{
          // delete existing
          const [existTasks,existSess,existSubjs]=await Promise.all([
            db.collection('users').doc(state.uid).collection('tasks').get(),
            db.collection('users').doc(state.uid).collection('sessions').get(),
            db.collection('users').doc(state.uid).collection('subjects').get(),
          ]);
          const delBatch=db.batch();
          existTasks.docs.forEach(d=>delBatch.delete(d.ref));
          existSess.docs.forEach(d=>delBatch.delete(d.ref));
          existSubjs.docs.forEach(d=>delBatch.delete(d.ref));
          await delBatch.commit();
          // re-import
          const batch2=db.batch();
          (data.tasks||[]).forEach(t=>batch2.set(db.collection('users').doc(state.uid).collection('tasks').doc(t.id),t));
          (data.sessions||[]).forEach(s=>batch2.set(db.collection('users').doc(state.uid).collection('sessions').doc(s.id),s));
          (data.subjects||[]).forEach(s=>batch2.set(db.collection('users').doc(state.uid).collection('subjects').doc(s.id),s));
          await batch2.commit();
          if(data.settings)await db.collection('users').doc(state.uid).set({settings:data.settings},{merge:true});
        };
        await deleteAllAndReimport();
        await loadAllData();
        renderView(state.currentView);
        alert('Import successful!');
      }catch(e){alert('Failed to import: '+e.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

    <div style="color:var(--text2);font-size:.82rem;line-height:1.6;margin-bottom:16px">
      Your Firebase config needs to be added to the HTML file.<br>
      Follow the setup instructions that came with this app.
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:.72rem;color:var(--text3);font-family:var(--font-mono);text-align:left;line-height:1.8">
      <strong style="color:var(--accent)">Steps to fix:</strong><br>
      1. Go to console.firebase.google.com<br>
      2. Create a project → Add Web App<br>
      3. Copy the firebaseConfig object<br>
      4. Paste it in index.html replacing<br>&nbsp;&nbsp;&nbsp;the placeholder values<br>
      5. Enable Google Auth + Firestore<br>
      6. Re-deploy to Netlify
    </div>
    ${msg?`<div style="margin-top:10px;background:var(--red2);border:1px solid rgba(232,92,92,0.3);border-radius:6px;padding:8px;font-size:.7rem;color:var(--red);font-family:var(--font-mono)">${msg}</div>`:''}
  </div>`;
}

// ── Auth state ─────────────────────────────────────────────
if(isConfigPlaceholder()){
  document.getElementById('loading').style.display='none';
  showConfigError('Config still contains placeholder values — replace YOUR_API_KEY etc. with your real Firebase config.');
}else{
// Timeout safety net — if Firebase never calls back within 12s, show error
const authTimeout=setTimeout(()=>{
  if(document.getElementById('loading').style.display!=='none'){
    showConfigError('Firebase timed out. Check: (1) your config values are correct, (2) Google Auth is enabled in Firebase console, (3) your Netlify domain is added to Firebase authorized domains.');
  }
},12000);

auth.onAuthStateChanged(async (user)=>{
  clearTimeout(authTimeout);
  document.getElementById('loading').style.display='none';
  if(user){
    state.user=user;state.uid=user.uid;
    document.getElementById('loading').style.display='flex';
    try{
      await loadAllData();
    }catch(e){
      console.error('Data load failed',e);
      showConfigError('Firestore error: '+e.message+'. Make sure Firestore is created in your Firebase project and security rules are set.');
      return;
    }
    document.getElementById('loading').style.display='none';
    if(!state.setupComplete){showSetup();}
    else{showAppShell();}
  }else{
    state.user=null;state.uid=null;
    document.getElementById('app-shell').style.display='none';
    document.getElementById('setup-overlay').classList.remove('open');
    renderLogin();
  }
});
}

// ============================================================
// SOUND ENGINE (Web Audio API)
// ============================================================
var audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return audioCtx;
}
function playTone(freq,type,duration,gain,fadeOut){
  gain=gain||0.15; fadeOut=fadeOut!==false;
  var ctx=getAudioCtx();if(!ctx)return;
  try{
    if(ctx.state==='suspended')ctx.resume();
    var osc=ctx.createOscillator();var vol=ctx.createGain();
    osc.connect(vol);vol.connect(ctx.destination);
    osc.type=type||'sine';osc.frequency.setValueAtTime(freq,ctx.currentTime);
    vol.gain.setValueAtTime(gain,ctx.currentTime);
    if(fadeOut)vol.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration);
  }catch(e){}
}
function chord(freqs,type,duration,gain,delay){delay=delay||0;freqs.forEach(function(f,i){setTimeout(function(){playTone(f,type,duration,gain);},delay+i*0);});}
function playSound(type){
  switch(type){
    case 'tap':
      playTone(700,'sine',0.04,0.08);
      break;
    case 'nav':
      playTone(520,'sine',0.05,0.07);
      setTimeout(function(){playTone(660,'sine',0.06,0.06);},40);
      break;
    case 'start':
      // Rising arpeggio - satisfying "let's go!"
      [330,415,523,659].forEach(function(f,i){setTimeout(function(){playTone(f,'sine',0.18,0.16);},i*70);});
      setTimeout(function(){chord([523,659,784],'sine',0.4,0.1);},350);
      break;
    case 'pause':
      playTone(500,'sine',0.12,0.14);
      setTimeout(function(){playTone(400,'sine',0.15,0.12);},80);
      break;
    case 'resume':
      playTone(400,'sine',0.1,0.12);
      setTimeout(function(){playTone(500,'sine',0.12,0.12);},70);
      setTimeout(function(){playTone(600,'sine',0.1,0.1);},140);
      break;
    case 'stop':
      playTone(600,'triangle',0.1,0.12);
      setTimeout(function(){playTone(450,'triangle',0.15,0.12);},90);
      setTimeout(function(){playTone(350,'triangle',0.2,0.1);},180);
      break;
    case 'complete':
      // Victory fanfare
      [262,330,392].forEach(function(f,i){setTimeout(function(){playTone(f,'triangle',0.15,0.18);},i*60);});
      setTimeout(function(){
        [392,494,587,784].forEach(function(f,i){setTimeout(function(){playTone(f,'sine',0.3,0.2);},i*90);});
      },200);
      setTimeout(function(){chord([523,659,784,1047],'sine',0.6,0.15);},600);
      break;
    case 'pop':
      playTone(900,'sine',0.04,0.12);
      setTimeout(function(){playTone(1100,'sine',0.03,0.08);},30);
      break;
    case 'log':
      playTone(440,'sine',0.08,0.13);
      setTimeout(function(){playTone(550,'sine',0.09,0.11);},55);
      setTimeout(function(){playTone(660,'sine',0.08,0.1);},110);
      break;
    case 'skip':
      playTone(600,'sawtooth',0.04,0.08);
      setTimeout(function(){playTone(500,'sawtooth',0.05,0.07);},60);
      break;
    case 'drag':
      playTone(350,'sine',0.03,0.07);
      break;
    case 'drop':
      playTone(500,'sine',0.06,0.1);
      setTimeout(function(){playTone(650,'sine',0.05,0.08);},50);
      break;
    case 'delete':
      playTone(300,'sawtooth',0.08,0.12);
      setTimeout(function(){playTone(200,'sawtooth',0.1,0.1);},100);
      break;
    case 'error':
      playTone(200,'square',0.1,0.12);
      setTimeout(function(){playTone(150,'square',0.08,0.08);},80);
      break;
    case 'streak':
      // Special sound for hitting daily target
      [523,659,784,1047,1319].forEach(function(f,i){setTimeout(function(){playTone(f,'sine',0.2,0.18);},i*80);});
      setTimeout(function(){chord([784,1047,1319],'triangle',0.8,0.12);},450);
      break;
  }
}

// ============================================================
// HAPTIC FEEDBACK
// ============================================================
function triggerHaptic(style){
  if(!navigator.vibrate)return;
  if(style==='light')navigator.vibrate(8);
  else if(style==='medium')navigator.vibrate(15);
  else if(style==='heavy')navigator.vibrate([20,10,20]);
  else if(style==='success')navigator.vibrate([10,30,10,30,50]);
  else if(style==='error')navigator.vibrate([50,20,50]);
}

// ============================================================
// CONFETTI ENGINE
// ============================================================
(function(){
  var COLORS=['#e8a832','#4dbe8c','#5b8dee','#e85c5c','#f472b6','#a3e635','#38bdf8','#fbbf24'];
  var particles=[];var animId=null;var canvas=null;var ctx2=null;
  function ensureCanvas(){
    if(canvas)return;
    canvas=document.createElement('canvas');
    canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
    document.body.appendChild(canvas);
    ctx2=canvas.getContext('2d');
    window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  }
  window.launchConfetti=function(x,y){
    ensureCanvas();
    for(var i=0;i<60;i++){
      particles.push({
        x:x||window.innerWidth/2, y:y||window.innerHeight*0.4,
        vx:(Math.random()-0.5)*14, vy:(Math.random()*-14)-4,
        color:COLORS[Math.floor(Math.random()*COLORS.length)],
        size:Math.random()*7+4, rotation:Math.random()*360,
        rotSpeed:(Math.random()-0.5)*12, gravity:0.45, opacity:1,
        shape:Math.random()>0.5?'rect':'circle'
      });
    }
    if(!animId)animConfetti();
  };
  function animConfetti(){
    ctx2.clearRect(0,0,canvas.width,canvas.height);
    particles=particles.filter(function(p){return p.opacity>0.02;});
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;
      p.vx*=0.99;p.rotation+=p.rotSpeed;p.opacity-=0.013;
      ctx2.save();ctx2.globalAlpha=Math.max(0,p.opacity);ctx2.fillStyle=p.color;
      ctx2.translate(p.x,p.y);ctx2.rotate(p.rotation*Math.PI/180);
      if(p.shape==='circle'){ctx2.beginPath();ctx2.arc(0,0,p.size/2,0,Math.PI*2);ctx2.fill();}
      else{ctx2.fillRect(-p.size/2,-p.size/3,p.size,p.size*0.6);}
      ctx2.restore();
    });
    if(particles.length>0){animId=requestAnimationFrame(animConfetti);}
    else{animId=null;ctx2.clearRect(0,0,canvas.width,canvas.height);}
  }
})();

// ============================================================
// TOAST & CELEBRATION
// ============================================================
function showToast(msg,type){
  type=type||'info';
  var existing=document.getElementById('toast-container');
  if(existing)existing.remove();
  var div=document.createElement('div');
  div.id='toast-container';
  div.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:8000;pointer-events:none';
  var bg=type==='success'?'#4dbe8c':type==='error'?'#e85c5c':'#e8a832';
  var msgSafe=msg.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  div.innerHTML='<div style="background:'+bg+';color:#000;padding:10px 20px;border-radius:20px;font-size:.82rem;font-weight:600;font-family:sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap;animation:toastIn .25s ease">'+msgSafe+'</div>';
  var style=document.createElement('style');
  style.textContent='@keyframes toastIn{from{opacity:0;transform:translateY(12px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}';
  div.appendChild(style);
  document.body.appendChild(div);
  setTimeout(function(){div.style.opacity='0';div.style.transition='opacity .3s';setTimeout(function(){div.remove();},300);},2500);
}
function celebrateTaskComplete(taskName){
  launchConfetti();
  playSound('complete');
  triggerHaptic('success');
  showToast('Completed: '+taskName,'success');
}
</script>
